<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéJourney</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;}
body{background:#0d0d1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden;}
#gba-shell{
  width:520px;background:linear-gradient(160deg,#2c2c5e 0%,#1a1a40 60%,#12123a 100%);
  border-radius:12px 12px 50px 50px;padding:20px 20px 32px;
  box-shadow:0 0 80px rgba(80,60,200,0.5),0 0 20px rgba(0,0,0,0.8),inset 0 2px 6px rgba(255,255,255,0.12);
  position:relative;border:2px solid #3a3a7a;
}
#gba-shell::before{content:'';position:absolute;top:0;left:60px;right:60px;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);border-radius:3px;}
#screen-bezel{background:#111;border-radius:10px;padding:10px;box-shadow:inset 0 0 30px rgba(0,0,0,0.9),0 4px 8px rgba(0,0,0,0.5);border:2px solid #222;}
#screen{width:480px;height:320px;background:#1a2a1a;position:relative;overflow:hidden;cursor:default;border-radius:4px;border:2px solid #0a0a0a;font-size:1.4em;}
#gba-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:4px;white-space:nowrap;}
#gba-controls{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding:0 8px;}
.dpad{width:84px;height:84px;position:relative;}
.dpad-btn{position:absolute;background:linear-gradient(135deg,#2a2a4a,#1a1a3a);color:#5a5a8a;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border-radius:4px;user-select:none;transition:all 0.08s;border:1px solid #3a3a6a;box-shadow:0 3px 0 #0a0a1a;}
.dpad-btn:active,.dpad-btn.pressed{background:#1a1a3a;transform:translateY(2px);box-shadow:0 1px 0 #0a0a1a;color:#8a8aaa;}
.dpad-up{top:0;left:50%;transform:translateX(-50%);width:28px;height:28px;}
.dpad-up:active,.dpad-up.pressed{transform:translateX(-50%) translateY(2px);}
.dpad-down{bottom:0;left:50%;transform:translateX(-50%);width:28px;height:28px;}
.dpad-down:active,.dpad-down.pressed{transform:translateX(-50%) translateY(2px);}
.dpad-left{left:0;top:50%;transform:translateY(-50%);width:28px;height:28px;}
.dpad-left:active,.dpad-left.pressed{transform:translateY(-50%) translateY(2px);}
.dpad-right{right:0;top:50%;transform:translateY(-50%);width:28px;height:28px;}
.dpad-right:active,.dpad-right.pressed{transform:translateY(-50%) translateY(2px);}
.dpad-center{top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:#1a1a3a;border-radius:4px;}
.ab-btns{display:flex;gap:14px;align-items:center;}
.ab-btn{width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-family:'Press Start 2P',monospace;user-select:none;transition:all 0.08s;border:none;box-shadow:0 5px 0 rgba(0,0,0,0.5),inset 0 2px 4px rgba(255,255,255,0.2);}
.ab-btn:active,.ab-btn.pressed{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,0.5);}
.btn-b{background:linear-gradient(135deg,#c0392b,#8e2219);}
.btn-a{background:linear-gradient(135deg,#27ae60,#1a7a42);}
.sys-btns{display:flex;flex-direction:column;gap:6px;align-items:center;}
.sys-btn{width:44px;height:13px;background:linear-gradient(135deg,#333,#222);border-radius:7px;cursor:pointer;font-size:7px;color:#666;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;border:1px solid #3a3a3a;box-shadow:0 2px 0 #111;}
.sys-btn:active{transform:translateY(1px);box-shadow:0 1px 0 #111;}
.screen-fill{width:100%;height:100%;position:absolute;top:0;left:0;}
/* Title */
#title-screen{background:linear-gradient(180deg,#0a1a4e 0%,#081240 50%,#050810 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.title-logo{font-size:28px;color:#f8c840;text-shadow:3px 3px 0 #c87820,-1px -1px 0 #e8a830,0 0 30px rgba(248,200,64,0.5);letter-spacing:2px;margin-bottom:6px;animation:titlePulse 2s ease-in-out infinite;}
@keyframes titlePulse{0%,100%{text-shadow:3px 3px 0 #c87820,-1px -1px 0 #e8a830,0 0 30px rgba(248,200,64,0.5)}50%{text-shadow:3px 3px 0 #c87820,-1px -1px 0 #e8a830,0 0 60px rgba(248,200,64,0.9)}}
.title-sub{font-size:9px;color:#88a8e8;margin-bottom:20px;letter-spacing:2px;}
.title-pokemon-row{display:flex;gap:6px;margin-bottom:20px;}
.title-pokemon-row img{width:60px;height:60px;filter:drop-shadow(0 0 8px rgba(255,255,200,0.4));animation:floatImg 3s ease-in-out infinite;}
.title-pokemon-row img:nth-child(2){animation-delay:0.3s;}
.title-pokemon-row img:nth-child(3){animation-delay:0.6s;}
@keyframes floatImg{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.press-start{font-size:9px;color:#f8f8f8;animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.title-version{font-size:7px;color:#4a6aa0;position:absolute;bottom:6px;right:8px;}
.title-stars{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}
/* Name */
#name-screen{background:linear-gradient(180deg,#c8e8b0,#a8d090);display:flex;flex-direction:column;align-items:center;padding:16px 14px;}
.name-box{background:#fff;border:3px solid #386038;padding:12px 20px;margin:8px 0;width:100%;text-align:center;box-shadow:3px 3px 0 #386038;}
.name-title{font-size:11px;color:#1a4a1a;margin-bottom:10px;}
.name-input-display{font-size:16px;color:#000;letter-spacing:4px;min-height:20px;border-bottom:3px solid #386038;padding-bottom:4px;min-width:140px;display:inline-block;}
.keyboard{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;width:100%;margin-top:6px;}
.key-btn{background:linear-gradient(180deg,#d8f0b0,#b8d890);border:2px solid #386038;color:#1a3a1a;font-size:9px;padding:5px 2px;cursor:pointer;font-family:'Press Start 2P',monospace;text-align:center;box-shadow:1px 2px 0 #386038;transition:all 0.08s;}
.key-btn:hover{background:linear-gradient(180deg,#c0e098,#a0c070);}
.key-btn:active{transform:translateY(1px);box-shadow:0 0 0 #386038;}
.key-btn.special{background:linear-gradient(180deg,#a0c8e0,#80a8c0);grid-column:span 2;}
/* Starter */
#starter-screen{background:linear-gradient(180deg,#d8f0c0,#b8d8a0);display:flex;flex-direction:column;align-items:center;padding:10px 8px;}
.starter-title{font-size:9px;color:#1a4a1a;text-align:center;line-height:2;margin-bottom:8px;background:rgba(255,255,255,0.5);padding:6px;border:2px solid #386038;width:100%;}
.starter-row{display:flex;gap:8px;justify-content:center;margin:6px 0;}
.starter-card{background:#fff;border:3px solid #386038;padding:8px 6px;cursor:pointer;text-align:center;width:138px;transition:all 0.15s;box-shadow:3px 3px 0 #386038;}
.starter-card:hover{background:#d8f8b0;border-color:#1a5020;transform:translateY(-3px);box-shadow:3px 6px 0 #386038;}
.starter-card img{width:68px;height:68px;}
.starter-name{font-size:10px;color:#000;margin-top:4px;}
.starter-types{display:flex;gap:3px;justify-content:center;margin-top:4px;}
.type-badge{font-size:7px;padding:2px 5px;border-radius:3px;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.3);}
.starter-hint{font-size:8px;color:#386038;text-align:center;margin-top:6px;animation:blink 1.5s step-end infinite;}
/* Overworld HUD */
#ow-hud{height:28px;background:linear-gradient(180deg,#0a1a0a,#1a2a1a);display:flex;align-items:center;padding:0 8px;gap:10px;border-bottom:2px solid #2a4a2a;flex-shrink:0;}
.hud-area{font-size:8px;color:#80d880;flex:1;}
.hud-badges{display:flex;gap:2px;}
.badge-icon{width:11px;height:11px;background:radial-gradient(circle,#ffd700,#c8a820);border-radius:50%;border:1px solid #a08010;box-shadow:0 0 4px rgba(255,215,0,0.6);}
.badge-empty{width:11px;height:11px;background:#2a2a2a;border-radius:50%;border:1px solid #444;}
.hud-team{font-size:8px;color:#80d880;}
.hud-money{font-size:8px;color:#f0d060;}
#ow-menu-bar{height:20px;background:linear-gradient(180deg,#1a2a1a,#0a1a0a);display:flex;align-items:center;padding:0 8px;gap:10px;border-top:2px solid #2a4a2a;flex-shrink:0;}
.ow-menu-btn{font-size:8px;color:#80d880;cursor:pointer;padding:2px 6px;border:1px solid #3a5a3a;transition:all 0.1s;}
.ow-menu-btn:hover{background:#2a4a2a;color:#a0f0a0;}
/* Battle */
#battle-screen{background:#e8e8e8;display:flex;flex-direction:column;}
#battle-field{height:192px;position:relative;overflow:hidden;background:linear-gradient(180deg,#87ceeb 0%,#b0d8f0 40%,#68b050 55%,#50922a 100%);}
.battle-bg-clouds{position:absolute;top:10px;left:0;width:100%;display:flex;gap:30px;}
.battle-cloud{font-size:22px;opacity:0.6;animation:cloudDrift 20s linear infinite;}
@keyframes cloudDrift{0%{transform:translateX(-60px)}100%{transform:translateX(520px)}}
.battle-platform-enemy{position:absolute;top:80px;right:60px;width:90px;height:18px;background:rgba(0,0,0,0.18);border-radius:50%;filter:blur(2px);}
.battle-platform-player{position:absolute;bottom:35px;left:30px;width:110px;height:22px;background:rgba(0,0,0,0.22);border-radius:50%;filter:blur(2px);}
.enemy-sprite{position:absolute;top:10px;right:65px;width:80px;height:80px;image-rendering:pixelated;}
.player-battle-sprite{position:absolute;bottom:38px;left:20px;width:80px;height:80px;image-rendering:pixelated;transform:scaleX(-1);}
@keyframes hitFlash{0%,100%{filter:none}50%{filter:brightness(5) saturate(0)}}
.enemy-hud{position:absolute;top:6px;left:6px;background:rgba(248,248,248,0.97);border:3px solid #333;padding:5px 8px;min-width:170px;border-radius:2px;box-shadow:2px 2px 0 rgba(0,0,0,0.3);}
.player-hud{position:absolute;bottom:6px;right:6px;background:rgba(248,248,248,0.97);border:3px solid #333;padding:5px 8px;min-width:185px;border-radius:2px;box-shadow:2px 2px 0 rgba(0,0,0,0.3);}
.hud-name-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.hud-poke-name{font-size:10px;color:#000;}
.hud-level{font-size:8px;color:#555;}
.hp-bar-wrap{display:flex;align-items:center;gap:4px;}
.hp-label{font-size:8px;color:#333;width:14px;text-align:right;}
.hp-bar-bg{flex:1;height:6px;background:#888;border-radius:3px;overflow:hidden;border:1px solid #666;}
.hp-bar{height:100%;border-radius:3px;transition:width 0.4s ease;}
.hp-full{background:linear-gradient(90deg,#40c840,#60e860);}
.hp-mid{background:linear-gradient(90deg,#d8c000,#f8e020);}
.hp-low{background:linear-gradient(90deg,#d82000,#f84020);}
.hp-nums{font-size:8px;color:#333;margin-top:2px;text-align:right;}
.exp-mini{height:3px;background:#5080f8;border-radius:2px;transition:width 0.5s;}
.exp-mini-bg{height:3px;background:#333;border-radius:2px;margin-top:2px;}
.status-badge{font-size:7px;padding:1px 4px;border-radius:2px;color:#fff;display:inline-block;margin-left:3px;}
#battle-ui{display:flex;flex-direction:column;background:#d8d8d8;border-top:3px solid #333;flex:1;}
#battle-log{height:56px;background:#f0f0f0;border-bottom:3px solid #333;padding:5px 8px;font-size:9px;color:#000;line-height:2;overflow:hidden;}
#battle-actions{display:flex;flex:1;}
.action-btn{background:linear-gradient(180deg,#f0f0f0,#d8d8d8);border:1px solid #aaa;color:#000;font-size:9px;padding:5px;cursor:pointer;font-family:'Press Start 2P',monospace;display:flex;align-items:center;gap:5px;transition:background 0.1s;}
.action-btn:hover{background:linear-gradient(180deg,#d8e8ff,#c0d0f0);}
.action-btn:active{background:#b8c8e8;}
.move-btn{background:linear-gradient(180deg,#f0f0f0,#d8d8d8);border:1px solid #bbb;color:#000;font-size:9px;padding:5px 6px;cursor:pointer;font-family:'Press Start 2P',monospace;display:flex;flex-direction:column;gap:3px;transition:background 0.1s;}
.move-btn:hover:not(:disabled){background:linear-gradient(180deg,#d8f0d8,#c0e0c0);}
.move-btn:disabled{opacity:0.4;cursor:not-allowed;}
.move-type-badge{font-size:7px;padding:1px 4px;border-radius:2px;color:#fff;display:inline-block;}
.move-pp{font-size:8px;color:#666;}
.move-pp.low-pp{color:#c03020;}
/* Menu */
#menu-screen{background:linear-gradient(180deg,#1a3a1a,#0a2a0a);display:flex;flex-direction:column;}
.menu-header{background:linear-gradient(135deg,#2a6a2a,#1a5a1a);padding:10px 12px;font-size:11px;color:#90f090;border-bottom:3px solid #3a8a3a;display:flex;justify-content:space-between;align-items:center;}
.menu-header-name{font-size:9px;color:#60c060;}
.menu-list{flex:1;padding:8px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;}
.menu-item{background:linear-gradient(135deg,#2a5a2a,#1e4a1e);border:2px solid #3a7a3a;color:#a0e8a0;font-size:9px;padding:9px 10px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.1s;box-shadow:2px 2px 0 rgba(0,0,0,0.3);}
.menu-item:hover{background:linear-gradient(135deg,#3a7a3a,#2a6a2a);color:#c0f8c0;transform:translateX(2px);}
.menu-item-icon{font-size:18px;width:20px;text-align:center;}
/* Pokémon Menu */
#pokemenu-screen{background:#0a1a0a;display:flex;flex-direction:column;}
.pm-header{background:linear-gradient(135deg,#1a4a1a,#0e3a0e);padding:8px 10px;font-size:10px;color:#80d880;border-bottom:3px solid #2a6a2a;display:flex;justify-content:space-between;}
.pm-list{flex:1;overflow-y:auto;padding:5px;}
.pm-card{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1a3a1a,#122a12);border:2px solid #2a5a2a;padding:5px;margin-bottom:3px;cursor:pointer;transition:all 0.1s;}
.pm-card:hover{background:linear-gradient(135deg,#2a4a2a,#1a3a1a);border-color:#3a7a3a;}
.pm-card.fainted{opacity:0.45;border-color:#5a3a3a;}
.pm-card.active-lead{border-color:#f0c030;box-shadow:0 0 6px rgba(240,192,48,0.4);}
.pm-sprite{width:44px;height:44px;image-rendering:pixelated;}
.pm-info{flex:1;min-width:0;}
.pm-name{font-size:9px;color:#90e890;margin-bottom:2px;}
.pm-level{font-size:8px;color:#60a860;}
.pm-hp-bar-bg{height:4px;background:#1a1a1a;border-radius:2px;margin-top:3px;}
.pm-hp-fill{height:100%;border-radius:2px;transition:width 0.3s;}
.pm-types{display:flex;gap:2px;margin-top:2px;}
.pm-back{font-size:9px;color:#5a9a5a;text-align:center;padding:7px;cursor:pointer;border-top:2px solid #1a4a1a;}
.pm-back:hover{color:#90e890;background:#0a2a0a;}
/* Detail */
#detail-screen{background:#0a0a2e;display:flex;flex-direction:column;padding:8px;overflow-y:auto;}
.detail-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;background:rgba(255,255,255,0.05);padding:8px;border:2px solid #2a2a6a;border-radius:4px;}
.detail-sprite{width:80px;height:80px;image-rendering:pixelated;background:radial-gradient(circle,rgba(255,255,255,0.1),transparent);border-radius:50%;}
.detail-info{flex:1;}
.detail-name{font-size:12px;color:#fff;margin-bottom:5px;}
.detail-types{display:flex;gap:4px;margin-bottom:5px;}
.detail-level{font-size:9px;color:#8080c8;margin-bottom:3px;}
.exp-bar-bg{height:4px;background:#1a1a3a;border-radius:2px;margin-top:2px;border:1px solid #2a2a4a;}
.exp-bar{height:100%;background:linear-gradient(90deg,#4060e8,#80a0ff);border-radius:2px;transition:width 0.5s;}
.exp-text{font-size:7px;color:#5a5a9a;margin-top:1px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.stat-row{background:linear-gradient(135deg,#1a1a4a,#12123a);padding:5px 7px;border-radius:3px;border:1px solid #2a2a5a;}
.stat-label{font-size:7px;color:#8080b8;margin-bottom:3px;}
.stat-val{font-size:10px;color:#fff;}
.stat-bar-bg{height:3px;background:#0a0a2a;border-radius:2px;margin-top:3px;}
.stat-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#4060e8,#80a0ff);}
.detail-moves-title{font-size:9px;color:#8080c8;margin:8px 0 4px;border-bottom:1px solid #2a2a5a;padding-bottom:3px;}
.move-detail-row{display:flex;justify-content:space-between;align-items:center;background:#12123a;padding:5px 7px;margin-bottom:3px;border:1px solid #2a2a5a;border-radius:2px;}
.move-detail-name{font-size:8px;color:#d0d0f0;}
.move-detail-info{font-size:7px;color:#7070a0;}
.detail-back{font-size:8px;color:#5a5a9a;text-align:center;margin-top:6px;cursor:pointer;padding:5px;border:1px solid #2a2a5a;}
.detail-back:hover{color:#a0a0e0;background:#0a0a2a;}
/* Bag */
#bag-screen{background:#160a2e;display:flex;flex-direction:column;}
.bag-header{background:linear-gradient(135deg,#3a1a5a,#280e42);padding:8px 10px;font-size:10px;color:#c890f0;border-bottom:3px solid #5a2a8a;display:flex;justify-content:space-between;}
.bag-list{flex:1;padding:6px;overflow-y:auto;}
.bag-item{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#2a1040,#1e0a30);border:2px solid #5a2a7a;padding:7px 8px;margin-bottom:3px;cursor:pointer;transition:all 0.1s;}
.bag-item:hover{background:linear-gradient(135deg,#3a1a50,#2a1040);border-color:#7a3a9a;}
.bag-item-icon{font-size:16px;width:20px;}
.bag-item-name{font-size:9px;color:#c880f0;flex:1;}
.bag-item-qty{font-size:9px;color:#f0b0f0;background:#1a0a28;padding:1px 5px;border:1px solid #4a2a6a;}
.bag-item-desc{font-size:7px;color:#7a50a0;margin-top:2px;}
.bag-empty{font-size:9px;color:#5a3a7a;text-align:center;margin-top:30px;line-height:2;}
.bag-back{font-size:8px;color:#7a4a9a;text-align:center;padding:7px;cursor:pointer;border-top:2px solid #2a1040;}
.bag-back:hover{color:#c080f0;background:#0e0a1e;}
/* Shop */
#shop-screen{background:#06061e;display:flex;flex-direction:column;}
.shop-header{background:linear-gradient(135deg,#1a1a5a,#0e0e3a);padding:8px 10px;font-size:10px;color:#9090f8;border-bottom:3px solid #3a3a8a;display:flex;justify-content:space-between;}
.shop-money{font-size:9px;color:#f8d030;padding:5px 8px;background:#0a0a2a;border-bottom:1px solid #2a2a5a;}
.shop-money span{color:#f0c820;}
.shop-list{flex:1;padding:5px;overflow-y:auto;}
.shop-item{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#12124a,#0a0a38);border:2px solid #3a3a7a;padding:7px 8px;margin-bottom:3px;cursor:pointer;transition:all 0.1s;}
.shop-item:hover{background:linear-gradient(135deg,#1e1e5a,#12124a);border-color:#5a5aa0;}
.shop-item-icon{font-size:16px;width:20px;}
.shop-item-name{font-size:9px;color:#9090f8;flex:1;}
.shop-item-price{font-size:9px;color:#f8d030;}
.shop-item-owned{font-size:8px;color:#5050a0;margin-left:6px;}
.shop-npc{font-size:9px;color:#7070c0;padding:8px;background:#0a0a2a;border:2px solid #2a2a5a;margin:5px;line-height:2;}
.shop-close{font-size:8px;color:#6060a0;text-align:center;padding:7px;cursor:pointer;border-top:2px solid #1a1a4a;}
.shop-close:hover{color:#a0a0f0;background:#050520;}
/* Dialog */
.dialog-box{background:#f8f8f8;border:4px solid #222;margin:6px 8px;padding:8px 10px;font-size:9px;color:#000;line-height:2.2;min-height:54px;box-shadow:3px 3px 0 rgba(0,0,0,0.5);position:relative;}
.dialog-box::before{content:'▶';position:absolute;bottom:6px;right:8px;animation:blink 0.6s step-end infinite;font-size:10px;}
/* Game Over */
#gameover-screen{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.go-title{font-size:15px;color:#f83020;text-shadow:2px 2px 0 #600000,0 0 20px rgba(248,48,32,0.6);margin-bottom:16px;}
.go-sub{font-size:9px;color:#666;margin-bottom:6px;text-align:center;line-height:2;}
.go-money{font-size:9px;color:#f8d030;margin-bottom:20px;}
.go-btn{background:linear-gradient(135deg,#2a2a2a,#1a1a1a);color:#a0a0a0;font-size:9px;padding:10px 18px;border:2px solid #3a3a3a;cursor:pointer;font-family:'Press Start 2P',monospace;transition:all 0.15s;box-shadow:2px 2px 0 #000;}
.go-btn:hover{background:linear-gradient(135deg,#3a3a3a,#2a2a2a);color:#d0d0d0;}
.fade-in{animation:fadeIn 0.25s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#notification{position:absolute;top:34px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;font-size:8px;padding:5px 10px;border:2px solid #555;border-radius:4px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:200;white-space:nowrap;}
#notification.show{opacity:1;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#3a3a6a;border-radius:2px;}
</style>

function notify(msg,dur=1500){
  const el=document.getElementById('notification');if(!el)return;
  el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur);

function expForLevel(lv,eg='medium_slow'){
  if(lv<=1)return 0;
  switch(eg){
    case'fast':return Math.floor(4*lv*lv*lv/5);
    case'medium_fast':return lv*lv*lv;
    case'medium_slow':return Math.max(0,Math.floor(6/5*lv*lv*lv-15*lv*lv+100*lv-140));
    case'slow':return Math.floor(5*lv*lv*lv/4);
    default:return lv*lv*lv;
  }
}

function calcStats(p){
  const b=PKDATA[p.id].stats,lv=p.level,iv=p.ivs;
  p.maxHp=Math.floor(((2*b.hp+iv.hp)*lv/100)+lv+10);
  p.atk=Math.floor(((2*b.atk+iv.atk)*lv/100)+5);
  p.def=Math.floor(((2*b.def+iv.def)*lv/100)+5);
  p.spa=Math.floor(((2*b.spa+iv.spa)*lv/100)+5);
  p.spd=Math.floor(((2*b.spd+iv.spd)*lv/100)+5);
  p.spe=Math.floor(((2*b.spe+iv.spe)*lv/100)+5);
}

function createPoke(id,level,wild=false){
  const base=PKDATA[id];if(!base)return null;
  const p={id,name:base.name,types:[...base.types],level,
    exp:expForLevel(level,base.eg||'medium_slow'),
    expNext:expForLevel(level+1,base.eg||'medium_slow'),
    moves:[],maxHp:0,hp:0,atk:0,def:0,spa:0,spd:0,spe:0,
    status:null,statusTurns:0,isWild:wild,
    ivs:{hp:rnd(32),atk:rnd(32),def:rnd(32),spa:rnd(32),spd:rnd(32),spe:rnd(32)},
    pp:{},stages:{atk:0,def:0,spa:0,spd:0,spe:0,acc:0,eva:0},nickname:null};
  calcStats(p);p.hp=p.maxHp;
  const ls=base.ls||{},learned=[];
  for(const[lstr,ms]of Object.entries(ls)){if(parseInt(lstr)<=level)learned.push(...ms);}
  const unique=[...new Set(learned)].slice(-4);
  p.moves=unique.filter(m=>MOVES[m]);
  if(p.moves.length===0)p.moves=['tackle'];
  for(const m of p.moves)p.pp[m]=MOVES[m].pp;
  return p;
}

function getStageMult(stage){return stage>=0?(2+stage)/2:2/(2-stage);}
function getStatS(p,s){return Math.floor(p[s]*getStageMult(p.stages[s]||0));}

function calcDmg(att,def,mid){
  const mv=MOVES[mid];if(!mv||mv.power===0)return{dmg:0,eff:1,crit:false};
  let as=mv.cat==='physical'?getStatS(att,'atk'):getStatS(att,'spa');
  let ds=mv.cat==='physical'?getStatS(def,'def'):getStatS(def,'spd');
  if(att.status==='burn'&&mv.cat==='physical')as=Math.floor(as/2);
  const eff=getEff(mv.type,def.types);
  const stab=att.types.includes(mv.type)?1.5:1;
  const critChance=mv.eff==='crit_high'?0.125:0.0625;
  const crit=Math.random()<critChance;
  const rndMult=0.85+Math.random()*0.15;
  const dmg=Math.max(1,Math.floor(((2*att.level/5+2)*mv.power*as/ds/50+2)*stab*eff*(crit?2:1)*rndMult));
  return{dmg,eff,crit};
}

function applyEff(att,def,mid){
  const mv=MOVES[mid];if(!mv||!mv.eff)return null;
  const e=mv.eff;let msg=null;
  if(e.startsWith('burn_')){const ch=parseInt(e.split('_')[1])/100;if(!def.status&&Math.random()<ch){def.status='burn';msg=`${def.name} was burned!`;}}
  else if(e.startsWith('poison_')&&e!=='poison_100'){const ch=parseInt(e.split('_')[1])/100;if(!def.status&&Math.random()<ch){def.status='poison';msg=`${def.name} was poisoned!`;}}
  else if(e.startsWith('para_')){const ch=parseInt(e.split('_')[1])/100;if(!def.status&&Math.random()<ch){def.status='paralysis';msg=`${def.name} was paralyzed!`;}}
  else if(e==='poison_100'){if(!def.status){def.status='poison';msg=`${def.name} was poisoned!`;}}
  else if(e==='sleep_100'){if(!def.status){def.status='sleep';def.statusTurns=2+rnd(4);msg=`${def.name} fell asleep!`;}}
  else if(e==='freeze_10'){if(!def.status&&Math.random()<0.1){def.status='freeze';msg=`${def.name} was frozen solid!`;}}
  else if(e==='lower_atk'){def.stages.atk=clamp((def.stages.atk||0)-1,-6,6);msg=`${def.name}'s Attack fell!`;}
  else if(e==='lower_def'){def.stages.def=clamp((def.stages.def||0)-1,-6,6);msg=`${def.name}'s Defense fell!`;}
  else if(e==='lower_spd'){def.stages.spe=clamp((def.stages.spe||0)-1,-6,6);msg=`${def.name}'s Speed fell!`;}
  else if(e==='raise_def'){att.stages.def=clamp((att.stages.def||0)+1,-6,6);msg=`${att.name}'s Defense rose!`;}
  return msg;
}

// ---- PREPROCESS MAPS (pad 5 tree cols each side → 30 wide) ----
const PAD=5;
let mapsReady=false;
function preprocessMaps(){
  if(mapsReady)return;mapsReady=true;
  for(const key of Object.keys(MAPS)){
    const map=MAPS[key];
    map.tiles=map.tiles.map(row=>[...Array(PAD).fill(1),...row,...Array(PAD).fill(1)]);
    map.w+=PAD*2;map.sx+=PAD;
    if(map.bldgs){
      const nb={};
      for(const[k,v]of Object.entries(map.bldgs)){const[x,y]=k.split(',').map(Number);nb[`${x+PAD},${y}`]=v;}
      map.bldgs=nb;
    }
    if(map.exits){for(const e of Object.values(map.exits)){if(e.ex!==undefined)e.ex+=PAD;}}
  }
}

function drawPlayer(ctx,px,py,dir,step){

  ctx.fillStyle='#f0c880';ctx.fillRect(px+4,py+4+bob,8,5);
  // eyes / direction

function drawMap(){
  const canvas=document.getElementById('ow-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const p=GS.player,map=MAPS[p.area];if(!map)return;
  const camX=clamp(p.pos.x-Math.floor(VW/2),0,Math.max(0,map.w-VW));
  const camY=clamp(p.pos.y-Math.floor(VH/2),0,Math.max(0,map.h-VH));
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  // Pass 1: ground tiles
  for(let y=0;y<VH;y++){
    for(let x=0;x<VW;x++){
      const t=getTileAt(map,x+camX,y+camY);
      if(t>=4&&t<=8){ctx.fillStyle='#c8b870';ctx.fillRect(x*TS,y*TS,TS,TS);}
      else drawTile(ctx,t,x*TS,y*TS,animFrame);
    }
  }
  // Pass 2: buildings (draw 32×32 sprite at top-left of 2×2 cluster)
  for(let y=0;y<VH;y++){
    for(let x=0;x<VW;x++){
      const t=getTileAt(map,x+camX,y+camY);
      if(t>=4&&t<=8){
        const tU=getTileAt(map,x+camX,y+camY-1);
        const tL=getTileAt(map,x+camX-1,y+camY);
        if(tU!==t&&tL!==t)drawBuilding(ctx,t,x*TS,y*TS);
      }
    }
  }
  // Pass 3: player
  const sx=(p.pos.x-camX)*TS,sy=(p.pos.y-camY)*TS;
  drawPlayer(ctx,sx,sy,p.dir||'down',playerStep);
}

// ---- BATTLE LOGIC ----
function startWildBattle(id,lv){
  const wild=createPoke(id,lv,true);
  const pp=GS.player.team.find(p=>p.hp>0);
  if(!pp){notify('No conscious Pokémon!');return;}
  GS.battle={player:pp,wild,turn:'choose',log:[`A wild ${wild.name} appeared!`],isTrainer:false,trIdx:0,showMoves:false,showBag:false};
  GS.scene='battle';GS.battleAnimating=false;render();
}

function startTrainerBattle(trData){
  const pp=GS.player.team.find(p=>p.hp>0);if(!pp)return;
  const tp=createPoke(trData.team[0].id,trData.team[0].lv);
  GS.battle={player:pp,wild:tp,turn:'choose',
    log:[`${trData.name} wants to battle!`,`Go! ${tp.name}!`],
    isTrainer:true,trainer:trData,trIdx:1,showMoves:false,showBag:false};
  GS.scene='battle';GS.battleAnimating=false;render();
}

function doTurn(playerMoveId){
  const b=GS.battle;
  if(b.turn!=='choose'||GS.battleAnimating)return;
  const mv=MOVES[playerMoveId];if(!mv)return;
  if((b.player.pp[playerMoveId]||0)<=0){showBattleMsgs(['No PP left for that move!'],()=>{});return;}
  b.player.pp[playerMoveId]--;
  b.turn='animating';GS.battleAnimating=true;
  const msgs=[];
  const pSpd=getStatS(b.player,'spe')*(b.player.status==='paralysis'?0.5:1);
  const wSpd=getStatS(b.wild,'spe')*(b.wild.status==='paralysis'?0.5:1);
  const pFirst=pSpd>wSpd||(pSpd===wSpd&&Math.random()<0.5);
  const wMid=b.wild.moves.length>0?b.wild.moves[rnd(b.wild.moves.length)]:'tackle';

  function doAtk(att,def,mid){
    const mv2=MOVES[mid]||MOVES['tackle'];
    if(att.status==='sleep'){att.statusTurns--;if(att.statusTurns<=0){att.status=null;msgs.push(`${att.name} woke up!`);}else{msgs.push(`${att.name} is fast asleep!`);return;}}
    if(att.status==='paralysis'&&Math.random()<0.25){msgs.push(`${att.name} is paralyzed and can't move!`);return;}
    if(att.status==='freeze'){if(Math.random()<0.2){att.status=null;msgs.push(`${att.name} thawed out!`);}else{msgs.push(`${att.name} is frozen solid!`);return;}}
    msgs.push(`${att.name} used ${mv2.name}!`);
    if(mv2.power>0){
      if(Math.random()>(mv2.acc||100)/100){msgs.push(`${att.name}'s attack missed!`);return;}
      if(mv2.eff==='level_dmg'){const dmg=att.level;def.hp=Math.max(0,def.hp-dmg);msgs.push(`It dealt ${dmg} damage!`);}
      else{
        const{dmg,eff,crit}=calcDmg(att,def,mid);
        const heal=mv2.eff==='drain'?Math.floor(dmg/2):0;
        def.hp=Math.max(0,def.hp-dmg);
        if(crit)msgs.push('A critical hit!');
        if(eff>=2)msgs.push("It's super effective!");
        else if(eff>0&&eff<1)msgs.push("It's not very effective...");
        else if(eff===0)msgs.push(`It doesn't affect ${def.name}!`);
        if(heal>0){att.hp=Math.min(att.maxHp,att.hp+heal);msgs.push(`${att.name} restored some HP!`);}
      }
      if(def.hp>0){const em=applyEff(att,def,mid);if(em)msgs.push(em);}
    }else{const em=applyEff(att,def,mid);if(em)msgs.push(em);else msgs.push('But nothing happened...');}
    if(att.hp>0&&(att.status==='burn'||att.status==='poison')){const dot=Math.max(1,Math.floor(att.maxHp/8));att.hp=Math.max(0,att.hp-dot);msgs.push(`${att.name} is hurt by its ${att.status}!`);}
  }

  if(pFirst){doAtk(b.player,b.wild,playerMoveId);if(b.wild.hp>0&&b.player.hp>0)doAtk(b.wild,b.player,wMid);}
  else{doAtk(b.wild,b.player,wMid);if(b.player.hp>0&&b.wild.hp>0)doAtk(b.player,b.wild,playerMoveId);}

  if(b.wild.hp<=0){
    msgs.push(`${b.wild.name} fainted!`);
    const exp=calcExp(b.wild);b.player.exp+=exp;msgs.push(`${b.player.name} gained ${exp} EXP!`);
    const lvMsgs=[];while(b.player.level<100&&b.player.exp>=b.player.expNext)doLevelUp(b.player,lvMsgs);msgs.push(...lvMsgs);
    if(b.isTrainer&&b.trainer&&b.trIdx<b.trainer.team.length){
      const next=b.trainer.team[b.trIdx++];const np=createPoke(next.id,next.lv);
      msgs.push(`${b.trainer.name} sent out ${np.name}!`);b.wild=np;
      showBattleMsgs(msgs,()=>{b.turn='choose';GS.battleAnimating=false;render();});
    }else{
      if(b.isTrainer){
        msgs.push(`${b.trainer?.name||'Trainer'} was defeated!`);
        if(b.trainer?.badge&&!GS.player.badges.includes(b.trainer.badge)){GS.player.badges.push(b.trainer.badge);msgs.push(`You got the ${b.trainer.badge}!`);}
        const reward=b.trainer?.reward||500;GS.player.money+=reward;msgs.push(`You got ₽${reward}!`);
      }
      b.turn='end_win';showBattleMsgs(msgs,()=>{render();setTimeout(endBattle,1200);});
    }
  }else if(b.player.hp<=0){
    msgs.push(`${b.player.name} fainted!`);
    const next=GS.player.team.find(p=>p!==b.player&&p.hp>0);
    if(next){msgs.push(`Go, ${next.name}!`);b.player=next;showBattleMsgs(msgs,()=>{b.turn='choose';GS.battleAnimating=false;render();});}
    else{msgs.push('All your Pokémon fainted! Blacked out...');b.turn='end_lose';showBattleMsgs(msgs,()=>{render();setTimeout(endBattle,1200);});}
  }else{b.turn='choose';showBattleMsgs(msgs,()=>{GS.battleAnimating=false;render();});}
}

function showBattleMsgs(msgs,done){
  let i=0;
  function next(){if(i>=msgs.length){if(done)done();return;}GS.battle.log=msgs.slice(Math.max(0,i-2),i+1);renderBattle();i++;setTimeout(next,800);}
  next();
}
function calcExp(foe){return Math.floor((PKDATA[foe.id].ey||50)*foe.level/7);}

function doLevelUp(p,msgs){
  p.level++;const oldMaxHp=p.maxHp;calcStats(p);p.hp=Math.min(p.maxHp,p.hp+(p.maxHp-oldMaxHp));
  p.expNext=expForLevel(p.level+1,PKDATA[p.id].eg||'medium_slow');
  msgs.push(`${p.name} grew to Lv.${p.level}!`);
  const base=PKDATA[p.id],curLs=base.ls||{};
  for(const[lstr,ms]of Object.entries(curLs)){
    if(parseInt(lstr)===p.level){for(const m of ms){if(!p.moves.includes(m)&&MOVES[m]&&p.moves.length<4){p.moves.push(m);p.pp[m]=MOVES[m].pp;msgs.push(`${p.name} learned ${MOVES[m].name}!`);}}}
  }
  if(base.eAt&&p.level>=base.eAt&&base.eTo&&PKDATA[base.eTo]){
    const oldName=p.name;p.id=base.eTo;const nb=PKDATA[base.eTo];
    p.name=nb.name;p.types=[...nb.types];calcStats(p);p.hp=Math.min(p.maxHp,p.hp+30);
    p.expNext=expForLevel(p.level+1,nb.eg||'medium_slow');
    msgs.push(`Congratulations! ${oldName} evolved into ${p.name}!`);
  }
}

function tryRun(){
  const b=GS.battle;
  if(b.isTrainer){showBattleMsgs(["Can't flee from a Trainer battle!"],()=>{});return;}
  if(GS.battleAnimating)return;GS.battleAnimating=true;
  const pSpd=b.player.spe,wSpd=b.wild.spe;
  const odds=((pSpd*128/Math.max(1,wSpd))+30)%256;
  if(Math.random()*256<odds){showBattleMsgs(['Got away safely!'],()=>{GS.battleAnimating=false;endBattle();});}
  else{
    const wm=b.wild.moves[rnd(b.wild.moves.length)]||'tackle';
    const{dmg}=calcDmg(b.wild,b.player,wm);b.player.hp=Math.max(0,b.player.hp-dmg);
    const msgs=["Can't escape!",`${b.wild.name} used ${MOVES[wm]?.name||'Tackle'}!`];
    if(b.player.hp<=0){b.turn='end_lose';showBattleMsgs(msgs,()=>{GS.battleAnimating=false;render();setTimeout(endBattle,1200);});}
    else showBattleMsgs(msgs,()=>{GS.battleAnimating=false;render();});
  }
}

function tryCatch(ballType){
  const b=GS.battle;
  if(b.isTrainer){showBattleMsgs(["Can't catch a Trainer's Pokémon!"],()=>{});return;}
  if(GS.battleAnimating)return;
  if(!GS.player.bag[ballType]||GS.player.bag[ballType]<=0){showBattleMsgs(['No balls of that type!'],()=>{});return;}
  if(GS.player.team.length>=6){showBattleMsgs(['Your party is full!'],()=>{});return;}
  GS.battleAnimating=true;GS.player.bag[ballType]--;
  const item=ITEMS[ballType];
  const cr=PKDATA[b.wild.id].cr||45;
  const hpF=(3*b.wild.maxHp-2*b.wild.hp)/(3*b.wild.maxHp);
  const sb=b.wild.status==='sleep'||b.wild.status==='freeze'?2:b.wild.status?1.5:1;
  const cv=cr*hpF*(item.cm||1)*sb;
  const caught=Math.random()*255<cv;
  const msgs=[`You threw a ${item.name}!`];
  if(caught){
    msgs.push(`${b.wild.name} was caught!`,'Added to your party!');
    b.wild.isWild=false;GS.player.team.push(b.wild);b.turn='end_catch';
    showBattleMsgs(msgs,()=>{GS.battleAnimating=false;render();setTimeout(endBattle,1500);});
  }else{
    const shakes=cv>192?3:cv>128?2:cv>64?1:0;
    msgs.push(`...${['It escaped!','It broke free!','So close!','Almost!'][shakes]}`);
    const wm=b.wild.moves.length>0?b.wild.moves[rnd(b.wild.moves.length)]:'tackle';
    if(b.player.hp>0){const{dmg}=calcDmg(b.wild,b.player,wm);b.player.hp=Math.max(0,b.player.hp-dmg);msgs.push(`${b.wild.name} used ${MOVES[wm]?.name||'Tackle'}!`);if(b.player.hp<=0)b.turn='end_lose';}
    showBattleMsgs(msgs,()=>{GS.battleAnimating=false;render();});
  }
}

function useBagItemInBattle(itemKey){
  const b=GS.battle;if(GS.battleAnimating)return;
  const item=ITEMS[itemKey];
  if(!item||!GS.player.bag[itemKey]||GS.player.bag[itemKey]<=0){showBattleMsgs(['No items left!'],()=>{});return;}
  if(item.t==='ball'){tryCatch(itemKey);return;}
  const p=b.player;GS.player.bag[itemKey]--;
  let msg=`Used ${item.name} on ${p.name}!`;
  if(item.t==='heal'){const heal=Math.min(item.heal===999?p.maxHp:item.heal,p.maxHp-p.hp);p.hp=Math.min(p.maxHp,p.hp+(item.heal===999?p.maxHp:item.heal));msg+=` Restored ${heal} HP.`;}
  else if(item.t==='status'){if(item.cures==='all')p.status=null;else if(p.status===item.cures)p.status=null;else msg=`It had no effect!`;}
  GS.battleAnimating=true;
  const wm=b.wild.moves.length>0?b.wild.moves[rnd(b.wild.moves.length)]:'tackle';
  const{dmg}=calcDmg(b.wild,p,wm);p.hp=Math.max(0,p.hp-dmg);
  const msgs=[msg,`${b.wild.name} used ${MOVES[wm]?.name||'Tackle'}!`];
  if(p.hp<=0)b.turn='end_lose';
  showBattleMsgs(msgs,()=>{GS.battleAnimating=false;render();});
}

function endBattle(){
  const b=GS.battle;if(!b)return;
  if(b.turn==='end_lose'){
    for(const p of GS.player.team){if(p.hp<=0)p.hp=Math.floor(p.maxHp/4);p.status=null;}
    GS.player.money=Math.max(0,Math.floor(GS.player.money*0.85));
    GS.battle=null;GS.scene='gameover';render();return;
  }
  GS.battle=null;GS.battleAnimating=false;GS.scene='overworld';render();
}

// ---- OVERWORLD LOGIC ----
function movePlayer(dx,dy){
  const p=GS.player;const map=MAPS[p.area];if(!map)return;
  const nx=p.pos.x+dx,ny=p.pos.y+dy;
  if(dx>0)p.dir='right';else if(dx<0)p.dir='left';else if(dy>0)p.dir='down';else if(dy<0)p.dir='up';
  const exits=map.exits||{};
  if(ny<0&&exits.north){const e=exits.north;p.area=e.target;p.pos={x:e.ex,y:MAPS[e.target].h-2};render();return;}
  if(ny>=map.h&&exits.south){const e=exits.south;p.area=e.target;p.pos={x:e.ex,y:1};render();return;}
  if(nx<0&&exits.west){const e=exits.west;p.area=e.target;p.pos={x:MAPS[e.target].w-2,y:e.ey};render();return;}
  if(nx>=map.w&&exits.east){const e=exits.east;p.area=e.target;p.pos={x:1,y:e.ey};render();return;}
  if(nx<0||nx>=map.w||ny<0||ny>=map.h)return;
  const tile=map.tiles[ny]?.[nx];
  if(tile===undefined||tile===1)return;
  if(tile>=4&&tile<=8){
    const key=`${nx},${ny}`;
    if(map.bldgs&&map.bldgs[key]){handleBuilding(map.bldgs[key]);return;}
    return;// blocked by building tile with no entry
  }
  p.pos={x:nx,y:ny};p.steps++;playerStep++;
  if(tile===2&&map.enc&&Math.random()<1/Math.max(1,map.enc.steps)){triggerEncounter(map.enc);return;}
  drawMap();
}

function triggerEncounter(enc){
  const total=enc.pokes.reduce((s,e)=>s+e.r,0);
  let roll=Math.random()*total,chosen=enc.pokes[0];
  for(const e of enc.pokes){roll-=e.r;if(roll<=0){chosen=e;break;}}
  const lv=chosen.mn+rnd(chosen.mx-chosen.mn+1);
  const name=PKDATA[chosen.id]?.name||'Pokémon';
  GS.prevScene='overworld';GS.dialog={msg:`A wild ${name} appeared!`,cb:null};
  GS.scene='dialog';render();
  setTimeout(()=>{GS.scene='overworld';startWildBattle(chosen.id,lv);},800);
}

function handleBuilding(bldg){
  if(bldg.t==='PC'){
    for(const p of GS.player.team){p.hp=p.maxHp;p.status=null;for(const m of p.moves)p.pp[m]=MOVES[m].pp;}
    GS.prevScene='overworld';GS.dialog={msg:'Welcome to the Pokémon Center!\nYour Pokémon are fully restored!',cb:null};
    GS.scene='dialog';render();setTimeout(()=>{GS.scene='overworld';render();},1800);
  }else if(bldg.t==='LAB'){
    if(GS.player.team.length===0){GS.scene='starter';render();}
    else{GS.prevScene='overworld';GS.dialog={msg:"Prof. Oak: Your Pokédex is growing! Keep exploring the world!",cb:null};GS.scene='dialog';render();setTimeout(()=>{GS.scene='overworld';render();},1800);}
  }else if(bldg.t==='MART'){GS.shopArea=GS.player.area;GS.scene='shop';render();}
  else if(bldg.t==='GYM'){
    if(!bldg.badge)return;
    if(GS.player.badges.includes(bldg.badge)){
      GS.prevScene='overworld';GS.dialog={msg:`You already have the ${bldg.badge}! Come back anytime!`,cb:null};
      GS.scene='dialog';render();setTimeout(()=>{GS.scene='overworld';render();},1600);
    }else if(GS.player.team.length===0){
      GS.prevScene='overworld';GS.dialog={msg:"You need Pokémon to challenge the Gym!",cb:null};
      GS.scene='dialog';render();setTimeout(()=>{GS.scene='overworld';render();},1400);
    }else{
      const leader=bldg.leader;
      GS.prevScene='overworld';GS.dialog={msg:`${leader?.name||'Gym Leader'}: So, you dare challenge me? Prepare yourself!`,cb:null};
      GS.scene='dialog';render();
      setTimeout(()=>{GS.scene='overworld';if(leader)startTrainerBattle({...leader,badge:bldg.badge,reward:leader.reward||1500});},1600);
    }
  }else if(bldg.t==='HOUSE'){
    const msgs=["It's a cozy home. Someone's been brewing tea!","The fireplace crackles warmly inside.","Shelves line the walls with Pokémon books."];
    GS.prevScene='overworld';GS.dialog={msg:msgs[rnd(msgs.length)],cb:null};
    GS.scene='dialog';render();setTimeout(()=>{GS.scene='overworld';render();},1500);
  }
}

  const ppHpCls=ppHpPct>50?'hp-full':ppHpPct>20?'hp-mid':'hp-low';

        <div class="hp-bar-wrap"><span class="hp-label">HP</span><div class="hp-bar-bg"><div class="hp-bar ${wpHpCls}" style="width:${wpHpPct}%"></div></div></div>
      </div>

        <div class="hud-name-row"><span class="hud-poke-name">${pp.name}${ppSt}</span><span class="hud-level">Lv.${pp.level}</span></div>
        <div class="hp-bar-wrap"><span class="hp-label">HP</span><div class="hp-bar-bg"><div class="hp-bar ${ppHpCls}" style="width:${ppHpPct}%"></div></div></div>
        <div class="hp-nums">${pp.hp}/${pp.maxHp}</div>
        <div class="exp-mini-bg"><div class="exp-mini" style="width:${ppExpPct}%"></div></div>

      <div id="battle-log">${logText}</div>
      <div id="battle-actions" style="display:flex;flex:1;">
        <div style="display:${b.showMoves||b.showBag?'none':'grid'};grid-template-columns:1fr 1fr;flex:1;">
          <button class="action-btn" data-action="fight" ${isBusy?'disabled':''}>⚔️ FIGHT</button>

  const usable=Object.keys(GS.player.bag).filter(k=>GS.player.bag[k]>0&&ITEMS[k]);

  return usable.map(k=>{const item=ITEMS[k];return`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-bottom:1px solid #ccc;background:#f8f8f8;"><span style="font-size:9px">${item.icon||'📦'} ${item.name}</span><span style="font-size:8px;color:#555">×${GS.player.bag[k]}</span><button class="bag-battle-use-btn" data-item="${k}" style="font-size:8px;background:#4070c0;color:#fff;border:none;padding:2px 6px;cursor:pointer;font-family:'Press Start 2P',monospace">USE</button></div>`;}).join('');

function useItemOnParty(itemKey){
  const item=ITEMS[itemKey];const team=GS.player.team;
  if(team.length===0){notify('No Pokémon in party!');return;}
  const overlay=document.createElement('div');
  overlay.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:50;display:flex;flex-direction:column;padding:10px;gap:3px;overflow-y:auto;';
  overlay.innerHTML=`<div style="font-size:9px;color:#d090f0;margin-bottom:4px">Use ${item.name} on which Pokémon?</div>`+
    team.map((p,i)=>`<div class="bag-item" data-use="${i}" style="background:#1a0a30;border-color:#6a3a8a;">
      <img src="${spriteUrl(p.id)}" style="width:28px;height:28px">
      <div style="flex:1;font-size:8px;color:#c070e0">${p.name} Lv.${p.level}</div>
      <div style="font-size:7px;color:#8050a0">${p.hp}/${p.maxHp} HP${p.status?` [${statusAbbr[p.status]}]`:''}</div>
    </div>`).join('')+
    `<div style="font-size:8px;color:#7050a0;cursor:pointer;text-align:center;padding:4px" id="use-cancel">Cancel</div>`;
  screen.appendChild(overlay);
  overlay.querySelectorAll('[data-use]').forEach(el=>{
    el.addEventListener('click',()=>{
      const poke=team[parseInt(el.dataset.use)];
      if(!GS.player.bag[itemKey]||GS.player.bag[itemKey]<=0){notify('No more left!');overlay.remove();return;}
      GS.player.bag[itemKey]--;
      let msg='';
      if(item.t==='heal'){
        if(poke.hp<=0&&item.heal<999){msg=`Can't use on a fainted Pokémon!`;GS.player.bag[itemKey]++;overlay.remove();notify(msg);return;}
        const amt=item.heal===999?poke.maxHp:item.heal;
        const healed=Math.min(amt,poke.maxHp-poke.hp);
        poke.hp=Math.min(poke.maxHp,poke.hp+amt);
        msg=`${poke.name} restored ${healed} HP!`;
      }else if(item.t==='status'){
        if(!poke.status){msg=`${poke.name} doesn't need that!`;GS.player.bag[itemKey]++;overlay.remove();notify(msg);return;}
        if(item.cures==='all'||poke.status===item.cures){poke.status=null;msg=`${poke.name}'s condition was cured!`;}
        else{msg=`It had no effect!`;GS.player.bag[itemKey]++;}
      }
      overlay.remove();notify(msg,2000);render();
    });
  });
  document.getElementById('use-cancel')?.addEventListener('click',()=>overlay.remove());
}

//  INPUT HANDLING
// ============================================================
function handleABtn(){
  switch(GS.scene){
    case'title':GS.nameInput='';GS.scene='name';render();break;
    case'dialog':
      if(GS.dialog?.cb){GS.dialog.cb();GS.dialog=null;}
      else{GS.scene=GS.prevScene||'overworld';render();}
      break;
    case'overworld':{
      const p=GS.player,map=MAPS[p.area];
      const dirs={up:{dx:0,dy:-1},down:{dx:0,dy:1},left:{dx:-1,dy:0},right:{dx:1,dy:0}};
      const d=dirs[p.dir]||{dx:0,dy:1};
      const fx=p.pos.x+d.dx,fy=p.pos.y+d.dy;
      const tile=map?.tiles[fy]?.[fx];
      if(tile!==undefined&&tile>=4&&tile<=8){
        const key=`${fx},${fy}`;
        if(map.bldgs&&map.bldgs[key])handleBuilding(map.bldgs[key]);
      }
      break;}
  }
}

function handleBBtn(){
  switch(GS.scene){
    case'menu':case'pokemenu':case'bag':case'detail':GS.scene='overworld';render();break;
    case'shop':GS.scene='overworld';render();break;
    case'battle':
      if(GS.battle?.showMoves){GS.battle.showMoves=false;renderBattle();}
      else if(GS.battle?.showBag){GS.battle.showBag=false;renderBattle();}
      break;
  }
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(GS.scene==='name')return;
  switch(e.key){
    case'ArrowUp':case'w':case'W':if(GS.scene==='overworld')movePlayer(0,-1);break;
    case'ArrowDown':case's':case'S':if(GS.scene==='overworld')movePlayer(0,1);break;
    case'ArrowLeft':case'a':case'A':if(GS.scene==='overworld')movePlayer(-1,0);break;
    case'ArrowRight':case'd':case'D':if(GS.scene==='overworld')movePlayer(1,0);break;
    case'Enter':case'z':case'Z':handleABtn();break;
    case'Escape':case'x':case'X':handleBBtn();break;
    case'm':case'M':if(GS.scene==='overworld'){GS.scene='menu';render();}break;
    case'b':case'B':if(GS.scene==='title'){// load save on B on title
      try{const sv=localStorage.getItem('pokejsave');if(sv){GS.player=JSON.parse(sv);GS.scene='overworld';render();notify('Save loaded!',2000);}}catch(e){}
    }break;
  }
});

// A / B buttons
document.getElementById('btn-a')?.addEventListener('click',()=>{
  document.getElementById('btn-a').classList.add('pressed');setTimeout(()=>document.getElementById('btn-a').classList.remove('pressed'),150);
  handleABtn();
});
document.getElementById('btn-b')?.addEventListener('click',()=>{
  document.getElementById('btn-b').classList.add('pressed');setTimeout(()=>document.getElementById('btn-b').classList.remove('pressed'),150);
  handleBBtn();
});

// START / SELECT
document.getElementById('start-btn')?.addEventListener('click',()=>{
  if(GS.scene==='title'){GS.nameInput='';GS.scene='name';render();}
  else if(GS.scene==='overworld'){GS.scene='menu';render();}
  else if(GS.scene==='menu'){GS.scene='overworld';render();}
  else if(GS.scene==='tutorial'){GS.scene='overworld';render();}
});
document.getElementById('select-btn')?.addEventListener('click',()=>{
  if(GS.scene==='overworld'){GS.bagMode=null;GS.scene='pokemenu';render();}
});

// ---- Water tile animation ----
setInterval(()=>{animFrame=(animFrame+1)%4;if(GS.scene==='overworld')drawMap();},600);

// ---- Try to restore save on load ----
(function tryLoadSave(){
  try{
    const sv=localStorage.getItem('pokejsave');
    if(sv){const parsed=JSON.parse(sv);if(parsed&&parsed.name&&parsed.team)GS.player=parsed;}
  }catch(e){}
})();

// ---- BOOT ----
preprocessMaps();
render();
</script>
</body>
</html>
